# Gradle build properties for qupath-extension-workshop
# These complement the version constants in build.gradle.kts.

# JVM heap for Gradle daemon
org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8

# Reproducible build
org.gradle.configuration-cache=true
org.gradle.parallel=true
org.gradle.caching=true

# QuPath baseline targeted by this extension build
qupathVersion=0.6.0
